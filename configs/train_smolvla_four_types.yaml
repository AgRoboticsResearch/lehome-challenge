dataset:
  repo_id: repo_smolvla_four_types
  root: Datasets/example/four_types_merged

policy:
  type: smolvla
  device: cuda
  push_to_hub: false

  # Full fine-tuning: unfreeze VLM backbone for MA
  train_expert_only: false
  freeze_vision_encoder: false
  train_state_proj: true

  input_features:
    observation.state:
      type: STATE
      shape: [12]
    observation.images.top_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.left_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.right_rgb:
      type: VISUAL
      shape: [3, 480, 640]

  output_features:
    action:
      type: ACTION
      shape: [12]

output_dir: outputs/train/smolvla_four_types
batch_size: 16
steps: 100000
save_freq: 2000
log_freq: 100

wandb:
  enable: true
  project: lehome-challenge
