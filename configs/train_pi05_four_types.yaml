# π0.5 (pi05) Training Configuration for LeHome Challenge - Four Garment Types
# Reference: https://huggingface.co/docs/lerobot/en/pi05

dataset:
  repo_id: repo_pi05_four_types
  root: Datasets/example/four_types_merged

policy:
  type: pi05
  device: cuda
  push_to_hub: false

  # Pretrained model (choose one: lerobot/pi05_base or lerobot/pi05_libero)
  pretrained_path: lerobot/pi05_base

  # Memory optimization
  gradient_checkpointing: true
  compile_model: false

  # Mixed precision training
  dtype: bfloat16

  input_features:
    observation.state:
      type: STATE
      shape: [12]
    observation.images.top_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.left_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.right_rgb:
      type: VISUAL
      shape: [3, 480, 640]

  output_features:
    action:
      type: ACTION
      shape: [12]

output_dir: outputs/train/pi05_four_types
batch_size: 8
steps: 30000
save_freq: 5000
log_freq: 1000

wandb:
  enable: false
