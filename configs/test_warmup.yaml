# Smoke test for warmup_runner — minimal overrides on top of train_rl_stage2.yaml
# Usage: python -m scripts.test_warmup --config configs/test_warmup.yaml

# ── Frozen components (same as train_rl_stage2) ──
smolvla_pretrained_path: outputs/moe_train/smolvla_moe_expert_top_long_no_st_proj/checkpoints/008000/pretrained_model
rl_token_stage1_path: outputs/rl_token/stage1/checkpoints/step_10000/rl_token_stage1.pt
dataset_stats_path: Datasets/example/top_long_merged/meta/stats.json
task_description: "fold the garment"

# ── Environment (CPU) ──
task: LeHome-BiSO101-Direct-Garment-v2
garment_name: Top_Long_Unseen_0
garment_version: Release
garment_cfg_base_path: Assets/objects/Challenge_Garment
