dataset:
  repo_id: repo_smolvla_four_types_pretrained
  root: Datasets/example/four_types_merged

policy:
  type: smolvla
  pretrained_path: pretrained/smolvla_base
  device: cuda
  push_to_hub: false

  input_features:
    observation.state:
      type: STATE
      shape: [12]
    observation.images.top_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.left_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.right_rgb:
      type: VISUAL
      shape: [3, 480, 640]

  output_features:
    action:
      type: ACTION
      shape: [12]

output_dir: outputs/train/smolvla_four_types_pretrained
batch_size: 32
steps: 50000
save_freq: 5000
log_freq: 1000

wandb:
  enable: false
